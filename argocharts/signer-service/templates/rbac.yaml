# Minimal RBAC for signer service account.
# The signer service only communicates with external services (Harbor, Fulcio, Rekor)
# and needs no cluster-level Kubernetes API access. This Role grants only the
# permissions needed to read its own secrets.
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "chart.fullname" . }}-secret-reader
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "chart.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
    resourceNames:
      - {{ .Values.secrets.harborWebhook.name }}
      - {{ .Values.secrets.harborCredentials.name }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "chart.fullname" . }}-secret-reader
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "chart.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "chart.serviceAccountName" . }}
    namespace: {{ .Values.namespace }}
roleRef:
  kind: Role
  name: {{ include "chart.fullname" . }}-secret-reader
  apiGroup: rbac.authorization.k8s.io

# ExternalSecrets for signer-service
# Sources secrets from a ClusterSecretStore (vault-backend) and creates
# Kubernetes Secrets that the deployment references via secretKeyRef.
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ .Values.secrets.harborWebhook.name }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "chart.labels" . | nindent 4 }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: {{ .Values.secrets.harborWebhook.name }}
    creationPolicy: Owner
  data:
    - secretKey: {{ .Values.secrets.harborWebhook.key }}
      remoteRef:
        key: platform-signing/harbor-signer-webhook
        property: webhook-secret
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ .Values.secrets.harborCredentials.name }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "chart.labels" . | nindent 4 }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: {{ .Values.secrets.harborCredentials.name }}
    creationPolicy: Owner
  data:
    - secretKey: {{ .Values.secrets.harborCredentials.robotUser }}
      remoteRef:
        key: platform-signing/harbor-signer-credentials
        property: robot-user
    - secretKey: {{ .Values.secrets.harborCredentials.robotPassword }}
      remoteRef:
        key: platform-signing/harbor-signer-credentials
        property: robot-password

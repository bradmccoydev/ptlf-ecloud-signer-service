apiVersion: backstage.io/v1alpha1
kind: Resource
metadata:
  name: rekor-log
  description: Private Rekor transparency log at rekor.platform.cuscal.io recording all signing events
  tags:
    - rekor
    - sigstore
    - transparency-log
spec:
  type: transparency-log
  owner: platform-team
  system: Supply Chain Security
  lifecycle: production

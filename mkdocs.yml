site_name: Signer Service
site_description: Container image signing service for the Cuscal Cloud Platform using private Sigstore infrastructure
repo_url: https://github.com/cuscal/ptlf-ecloud-signer-service
edit_uri: edit/main/docs/

nav:
  - Home: index.md
  - Getting Started:
      - Quick Start: getting-started/quick-start.md
      - Installation: getting-started/installation.md
      - Configuration: getting-started/configuration.md
  - Architecture:
      - Overview: architecture/overview.md
      - Components: architecture/components.md
      - Signing Pipeline: architecture/signing-pipeline.md
  - API Reference:
      - Webhook: api/webhook.md
      - Health Endpoints: api/health.md
  - Development:
      - Setup: development/setup.md
      - Testing: development/testing.md
      - Contributing: development/contributing.md
  - Operations:
      - Deployment: operations/deployment.md
      - Monitoring: operations/monitoring.md
      - Troubleshooting: operations/troubleshooting.md
      - Tier 0 Classification: tier0-classification.md
      - SLOs and SLIs: slos-and-slis.md
      - Disaster Recovery: disaster-recovery.md
      - Runbooks:
          - Service Down: runbooks/service-down.md
          - High Error Rate: runbooks/high-error-rate.md
          - Fulcio Failures: runbooks/fulcio-failures.md
          - Rekor Failures: runbooks/rekor-failures.md
          - Harbor Connectivity: runbooks/harbor-connectivity.md
          - Reconciliation Failures: runbooks/reconciliation-failures.md

theme:
  name: material
  palette:
    primary: indigo
    accent: indigo
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - search.suggest
    - search.highlight

plugins:
  - search
  - techdocs-core

markdown_extensions:
  - admonition
  - codehilite
  - pymdownx.superfences
  - pymdownx.tabbed
  - pymdownx.details
  - toc:
      permalink: true
